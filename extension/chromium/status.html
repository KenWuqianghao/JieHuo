<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JieHuo Model Status</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="options">
    <main>
      <header>
        <h1>JieHuo Model Status</h1>
        <p>The local neural model could not route this query.</p>
      </header>
      <section>
        <h2>Query</h2>
        <code id="query"></code>
      </section>
      <section>
        <h2>Error</h2>
        <code id="error"></code>
      </section>
      <button id="retry" type="button">Retry Local Model</button>
    </main>
    <script src="status.js"></script>
  </body>
</html>
