<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JieHuo Router Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="options">
    <main>
      <header>
        <h1>JieHuo Router Settings</h1>
        <p>Local address-bar routing for the JieHuo custom search URL.</p>
      </header>
      <form id="settings-form">
        <label class="check">
          <input id="enabled" type="checkbox" />
          Enable interception
        </label>
        <button type="submit">Save</button>
      </form>
      <section>
        <h2>Browser Search Engine URL</h2>
        <code>https://jiehuo.vercel.app/search?q=%s</code>
      </section>
      <section>
        <h2>Keyword Shortcut</h2>
        <code>jh your query</code>
      </section>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
